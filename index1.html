<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchnicoVtuber | Dashboard</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --twitch-purple: #9146FF;
            --accent-glow: #a970ff;
        }

        body {
            background-color: var(--bg-color);
            color: #eeeeee;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            width: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0b0b0b 100%);
        }

        header h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--twitch-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(145, 70, 255, 0.3);
        }

        .animated-card {
            position: relative;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 3px; /* Stärke des animierten Randes */
            margin: 20px 0;
            width: 90%;
            max-width: 800px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .animated-card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--twitch-purple));
            animation: rotate 6s linear infinite;
        }

        .card-content {
            position: relative;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            z-index: 2;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        #status-indicator {
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
            border: 1px solid #444;
            color: #888;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .link-btn {
            background: #222;
            border: 1px solid rgba(145, 70, 255, 0.3);
            color: white;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            background: var(--twitch-purple);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(145, 70, 255, 0.4);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 8px;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #222; }
        td:first-child { color: var(--twitch-purple); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>Schnico</h1>
        <div id="status-indicator">Prüfe Status...
